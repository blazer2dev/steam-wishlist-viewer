<!DOCTYPE html>
<html lang="">

<head>
    <meta charset="UTF-8" />
    <title>Game Deals</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="" />
    <link rel="icon" href="{{ url_for('static', filename='favicon.png')}}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css')}}">
    <script src="{{ url_for('static', filename='js/scrollControl.js')}}" defer></script>
    <script src="{{ url_for('static', filename='js/validate.js')}}" defer></script>
</head>

<body>
    <div class="content">
        <div class="profile">
            {% if profile %}
            <img src={{profile.prof_img_url}}>
            <span>{{profile.prof_name}}</span>
            {% endif%}
        </div>
        <form id="submit_form" action="/submit" method='POST'>
            <div class="banner">
                <h1>Game Deals</h1>
                <p>Enter your SteamID</p>
                <input type="number" placeholder="00000000000000000" name="profile_id_input"></input>
                <button type="submit" name="submit_button">Submit</button>
                <span id="error_log"></span>
            </div>
        </form>

        <div class="bar">
            {% for data in game_datas %}
            <div class="deal_container">
                <div class="deal_banner">
                    <img src={{data.img_url}}>
                    <span class="keyshop_price">Keyshop - {{data.keyshop_price}}</span>
                    <span class="official_price">Official - {{data.official_price}}</span>
                    <div class="deal_gradient"></div>
                </div>
                <span><a href={{data.url}} target="_blank">{{data.game_name}}</a></span>
            </div>
            {% endfor %}
        </div>

        <footer>BlazerChlopiec &#169 2026</footer>
    </div>
</body>

</html>
